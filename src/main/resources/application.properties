spring.application.name=DSA Revision Tracker
server.port=${PORT:8080}

# ─── Supabase / PostgreSQL ────────────────────────────────────────────────────
# Set these three env-vars in your Render dashboard (or locally in your shell):
#   DATABASE_URL  – jdbc:postgresql://<host>:<port>/<db>
#   DB_USERNAME   – your Supabase DB user (usually "postgres")
#   DB_PASSWORD   – your Supabase DB password
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
# "update" creates tables automatically on first run and evolves the schema
# Change to "validate" once the schema is stable in production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ─── Logging ─────────────────────────────────────────────────────────────────
debug=false
logging.level.root=INFO
logging.level.org.springframework=INFO
